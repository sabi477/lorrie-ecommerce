<div class="dialog-backdrop" (click)="onBackdropClick($event)">
  <div class="dialog" role="dialog" aria-modal="true">
    <div class="dialog-header">
      <h2>Ürün Düzenle</h2>
      <button class="close-btn" (click)="close()" aria-label="Kapat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="dialog-body">
      @if (error) {
        <div class="error-banner">{{ error }}</div>
      }

      <div class="form-grid">
        <div class="field">
          <label>Ürün Adı</label>
          <input type="text" [(ngModel)]="form.name" required />
        </div>

        <div class="field">
          <label>Marka</label>
          <input type="text" [(ngModel)]="form.brand" />
        </div>

        <div class="field">
          <label>SKU</label>
          <input type="text" [(ngModel)]="form.sku" />
        </div>

        <div class="field">
          <label>Fiyat</label>
          <input type="number" [(ngModel)]="form.price" min="0" step="0.01" required />
        </div>

        <div class="field">
          <label>Stok</label>
          <input type="number" [(ngModel)]="form.stockQuantity" min="0" required />
        </div>

        <div class="field field--full">
          <label>Açıklama</label>
          <textarea [(ngModel)]="form.description" rows="3"></textarea>
        </div>

        <div class="field">
          <label>Görsel URL</label>
          <input type="text" [(ngModel)]="form.imageUrl" />
        </div>

        <div class="field">
          <label>Küçük Görsel URL</label>
          <input type="text" [(ngModel)]="form.thumbnail" />
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn--secondary" (click)="close()">İptal</button>
      <button class="btn btn--primary" (click)="save()" [disabled]="saving">
        @if (saving) { Kaydediliyor... } @else { Kaydet }
      </button>
    </div>
  </div>
</div>
