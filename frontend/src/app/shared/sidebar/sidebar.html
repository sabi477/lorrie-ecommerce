<aside class="sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <img src="/lorrie-logo.png" alt="Lorrie logo" />
    </div>
    <span class="brand-name">LORRIE</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="nav-item--active"
        [id]="'nav-' + item.route.replace('/', '')">
        <span class="nav-icon" [innerHTML]="item.icon"></span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Footer: role badge + logout -->
  <div class="sidebar-footer">
    <span class="role-badge role-badge--{{ role.toLowerCase() }}">{{ roleLabel }}</span>
    <button class="logout-btn" (click)="logout()">{{ 'common.logout' | translate }}</button>
  </div>

</aside>
