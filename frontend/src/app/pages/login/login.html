<div class="login-wrapper">

  <!-- Background decoration -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <div class="login-card">

    <!-- Back Button -->
    <a routerLink="/" class="back-btn" aria-label="Geri dön">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <img src="/lorrie-logo.png" alt="Lorrie logo" />
      </div>
      <span class="brand-name">LORRIE</span>
    </div>

    <!-- Heading -->
    <div class="card-header">
      <h1>{{ 'auth.welcome' | translate }}</h1>
      <p>{{ 'auth.loginTitle' | translate }}</p>
    </div>

    <!-- Error -->
    @if (error) {
      <div class="error-banner" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
        {{ error }}
      </div>
    }

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="field">
        <label class="input-label" for="login-email">{{ 'auth.email' | translate }}</label>
        <input
          id="login-email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="ornek@mail.com"
          autocomplete="email"
          required />
      </div>

      <div class="field">
        <label class="input-label" for="login-password">{{ 'auth.password' | translate }}</label>
        <input
          id="login-password"
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required />
      </div>

      <button type="submit" class="cta-btn">{{ 'common.login' | translate }}</button>
    </form>



    <!-- Footer -->
    <p class="signup-prompt">
      {{ 'auth.dontHaveAccount' | translate }}
      <a routerLink="/register" class="signup-link">{{ 'common.register' | translate }}</a>
    </p>

  </div>

</div>
