<div class="login-wrapper">

  <!-- Background decoration -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <img src="/lorrie-logo.png" alt="Lorrie logo" />
      </div>
      <span class="brand-name">LORRIE</span>
    </div>

    <!-- Heading -->
    <div class="card-header">
      <h1>Hoş Geldiniz</h1>
      <p>Hesabınıza giriş yapın</p>
    </div>

    <!-- Error -->
    @if (error) {
      <div class="error-banner" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
        {{ error }}
      </div>
    }

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="field">
        <label class="input-label" for="login-email">E-posta</label>
        <input
          id="login-email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="ornek@mail.com"
          autocomplete="email"
          required />
      </div>

      <div class="field">
        <label class="input-label" for="login-password">Şifre</label>
        <input
          id="login-password"
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required />
      </div>

      <button type="submit" class="cta-btn">Giriş Yap</button>
    </form>



    <!-- Footer -->
    <p class="signup-prompt">
      Hesabın yok mu?
      <a routerLink="/register" class="signup-link">Kayıt Ol</a>
    </p>

  </div>

</div>
