<div class="login-wrapper">

  <!-- Background decoration -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/>
        </svg>
      </div>
      <span class="brand-name">Lorrie</span>
    </div>

    <!-- Heading -->
    <div class="card-header">
      <h1>Hoş Geldiniz</h1>
      <p>Hesabınıza giriş yapın</p>
    </div>

    <!-- Error -->
    @if (error) {
      <div class="error-banner" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
        {{ error }}
      </div>
    }

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="field">
        <label class="input-label" for="login-email">E-posta</label>
        <input
          id="login-email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="ornek@mail.com"
          autocomplete="email"
          required />
      </div>

      <div class="field">
        <label class="input-label" for="login-password">Şifre</label>
        <input
          id="login-password"
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required />
      </div>

      <button type="submit" class="cta-btn">Giriş Yap</button>
    </form>

    <!-- Demo accounts -->
    <div class="demo-section">
      <p class="demo-label">Hızlı Demo Girişi</p>
      <div class="demo-btns">
        <button class="demo-btn demo-btn--customer" (click)="demoLogin('CUSTOMER')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Müşteri
        </button>
        <button class="demo-btn demo-btn--admin" (click)="demoLogin('ADMIN')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Admin
        </button>
        <button class="demo-btn demo-btn--seller" (click)="demoLogin('SELLER')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Satıcı
        </button>
      </div>
    </div>

    <!-- Footer -->
    <p class="signup-prompt">
      Hesabın yok mu?
      <a routerLink="/register" class="signup-link">Kayıt Ol</a>
    </p>

  </div>

</div>
